<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NicoKlas | Verkleinwoorden Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/verdana');
        
        :root {
            --dynamic-spacing: 32px;
            --dynamic-font-size: 16px;
        }

        body { font-family: 'Verdana', sans-serif; background-color: #f3f4f6; }
        
        .strak-input {
            border: 1px solid #000;
            border-radius: 0;
            padding: 0.5rem;
            font-family: 'Verdana', sans-serif;
            width: 100%;
        }

        .cat-checkbox { display: none; }

        .cat-label {
            display: block;
            border: 1px solid #e5e7eb;
            padding: 0.5rem;
            font-size: 0.75rem;
            text-transform: lowercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cat-checkbox:checked + .cat-label {
            background-color: #000;
            color: #fff;
            border-color: #000;
        }

        .woord-blok {
            break-inside: avoid;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: var(--dynamic-spacing) !important;
        }

        .ws-word-container {
            width: 40%;
            flex-shrink: 0;
        }

        .ws-line {
            width: 60%;
            border-bottom: 1px solid #000;
            height: 1.2em;
        }

        #preview-list {
            font-size: var(--dynamic-font-size);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            column-gap: 3rem;
            align-content: start;
        }

        .page-footer {
            text-align: right;
            padding-top: 2rem;
            font-size: 9px;
            color: #d1d5db;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            width: 100%;
            margin-top: 2rem;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .container { max-width: 100% !important; width: 100% !important; margin: 0 !important; }
            #werkblad-container { box-shadow: none !important; padding: 0 !important; margin: 0 !important; }
            .paper { border: none !important; box-shadow: none !important; width: 100% !important; padding: 0 !important; }
            .page-container { 
                padding: 10mm; 
                display: block;
                min-height: auto !important;
            }
            .page-break { page-break-before: always; }
            #preview-list { 
                display: grid !important;
                grid-template-columns: repeat(2, 1fr) !important;
                align-content: start !important;
            }
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto container">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
        
        <aside class="no-print space-y-8 order-1 md:order-1">
            <div class="bg-white p-6 border border-gray-200 shadow-sm">
                <h2 class="text-xs font-bold uppercase mb-4 text-black tracking-widest border-b border-black pb-2">1. Categorieën</h2>
                <div class="grid grid-cols-2 gap-2 mb-6">
                    <label><input type="checkbox" class="cat-check cat-checkbox" value="je" checked><span class="cat-label">-je</span></label>
                    <label><input type="checkbox" class="cat-check cat-checkbox" value="pje"><span class="cat-label">-pje</span></label>
                    <label><input type="checkbox" class="cat-check cat-checkbox" value="tje"><span class="cat-label">-tje</span></label>
                    <label><input type="checkbox" class="cat-check cat-checkbox" value="etje"><span class="cat-label">-etje</span></label>
                    <label><input type="checkbox" class="cat-check cat-checkbox" value="klinker"><span class="cat-label">klinker</span></label>
                    <label><input type="checkbox" class="cat-check cat-checkbox" value="medeklinker"><span class="cat-label">medekl.</span></label>
                    <label class="col-span-2"><input type="checkbox" class="cat-check cat-checkbox" value="uitzondering"><span class="cat-label">speciaal</span></label>
                </div>

                <h2 class="text-xs font-bold uppercase mb-4 text-black tracking-widest border-b border-black pb-2">2. Instellingen</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold uppercase mb-2 block text-black">Aantal oefeningen</label>
                        <input type="number" id="num-ex" value="20" min="1" max="100" class="strak-input">
                    </div>
                    <div>
                        <label class="text-xs font-bold uppercase mb-2 block text-black flex justify-between">
                            Lettergrootte <span id="val-f-size">16px</span>
                        </label>
                        <input type="range" id="f-size" min="12" max="24" value="16" class="w-full accent-black">
                    </div>
                    <div>
                        <label class="text-xs font-bold uppercase mb-2 block text-black flex justify-between">
                            Regelafstand <span id="val-spacing">32px</span>
                        </label>
                        <input type="range" id="line-space" min="20" max="60" value="32" class="w-full accent-black">
                    </div>
                    <label class="flex items-center gap-2 cursor-pointer pt-2">
                        <input type="checkbox" id="show-ans" class="accent-black">
                        <span class="text-[10px] font-bold uppercase">Verbeterblad</span>
                    </label>
                </div>

                <div class="flex flex-col gap-3 mt-8">
                    <button onclick="buildWorksheet()" class="bg-black text-white text-xs font-bold uppercase tracking-widest py-4 hover:bg-gray-800 transition">Genereer</button>
                    <button onclick="window.print()" class="border border-black text-black text-xs font-bold uppercase tracking-widest py-4 hover:bg-gray-50 transition">Print</button>
                </div>

                <div class="mt-12 text-[10px] text-gray-400 uppercase tracking-widest text-center">CC BY-NC-SA 4.0 NicoKlas</div>
            </div>
        </aside>

        <main id="werkblad-container" class="md:col-span-3 order-2 md:order-2">
            <div id="paper" class="bg-white shadow-2xl min-h-[29.7cm] p-4 md:p-12 paper">
                <div id="ws-content"></div>
            </div>
        </main>
        
    </div>
</div>

<script>
    const database = {
        je: ['roos', 'bed', 'licht', 'fles', 'drank', 'plant', 'balk', 'huis', 'bord', 'kaars', 'kast', 'buis', 'laars', 'gerecht', 'scherf', 'vlieg', 'schelp', 'baas', 'haas', 'bos', 'hond', 'kat', 'brief', 'brood', 'beest', 'aap', 'tas', 'zak', 'broek', 'fiets', 'zus', 'bank', 'vork', 'schep', 'wolk', 'markt', 'feest', 'worst', 'schat', 'muts'],
        pje: ['raam', 'helm', 'boom', 'lichaam', 'naam', 'scherm', 'duim', 'arm', 'film', 'darm', 'geheim', 'worm', 'vorm', 'riem', 'bezem', 'bodem', 'bloem', 'kraam', 'pluim', 'stroom'],
        tje: ['tuin', 'tafel', 'stoel', 'trui', 'zaal', 'eekhoorn', 'ijsbeer', 'veulen', 'vuur', 'kikker', 'schaar', 'vlinder', 'banaan', 'bijl', 'kooi', 'vijver', 'zetel', 'haai', 'keel', 'vrouw', 'ei', 'toren', 'vinger', 'rij', 'lijn', 'schaal', 'kussen', 'laken', 'zee', 'vogel', 'lepel', 'appel', 'sleutel', 'deur', 'muur', 'schuur', 'knie', 'vloer', 'broer'],
        etje: ['slang', 'tekening', 'wandeling', 'gang', 'ding', 'ring', 'tong'],
        klinker: ['foto', 'piano', 'mango', 'panda', 'pyjama', 'paraplu', 'radio', 'euro', 'oma', 'opa', 'gorilla', 'chocola', 'papa', 'mama', 'café', 'sla', 'taxi', 'auto'],
        medeklinker: ['stal', 'kom', 'spin', 'spel', 'man', 'pil', 'ster', 'bel', 'krul', 'kar', 'bom', 'bal', 'kam', 'vlag', 'big', 'snor', 'pop'],
        uitzondering: ['jongen', 'baby', 'machine', 'blad', 'glas', 'schip', 'gat', 'koning', 'pudding', 'ketting']
    };

    const solve = {
        je: w => w + 'je', pje: w => w + 'pje', tje: w => w + 'tje', etje: w => w + 'etje',
        klinker: w => {
            const low = w.toLowerCase();
            if (low === 'taxi') return "taxietje";
            if (low === 'auto') return "autootje";
            if (['a','o','u'].some(l => low.endsWith(l))) return w + w.slice(-1) + 'tje';
            if (low.endsWith('e') || low.endsWith('é')) return w + 'etje';
            return w + 'tje';
        },
        medeklinker: w => w + w.slice(-1) + 'etje',
        uitzondering: w => {
            const d = {'jongen':'jongetje','baby':"baby'tje",'machine':'machientje','blad':'blaadje','glas':'glaasje','schip':'scheepje','gat':'gaatje','koning':'koninkje','pudding':'puddinkje','ketting':'kettinkje'};
            return d[w.toLowerCase()] || w + 'je';
        }
    };

    let currentSelection = [];

    window.onload = buildWorksheet;

    function buildWorksheet() {
        const rawCats = Array.from(document.querySelectorAll('.cat-check:checked')).map(c => c.value);
        if (rawCats.length === 0) return;

        const catNames = { 'je': '-je', 'pje': '-pje', 'tje': '-tje', 'etje': '-etje', 'klinker': 'klinkers', 'medeklinker': 'medeklinkers', 'uitzondering': 'speciaal' };
        const label = rawCats.map(c => catNames[c]).join(' • ');

        const num = parseInt(document.getElementById('num-ex').value);
        let pool = [];
        rawCats.forEach(cat => database[cat].forEach(word => pool.push({word, cat})));
        pool.sort(() => Math.random() - 0.5);
        currentSelection = pool.slice(0, num);
        
        renderHTML(label);
    }

    function renderHTML(catLabel) {
        const showAns = document.getElementById('show-ans').checked;
        const footerText = "CC BY-NC-SA 4.0 NicoKlas";
        
        let html = `
            <div class="page-container">
                <header class="flex justify-between items-end border-b-2 border-black pb-4 mb-8">
                    <div>
                        <h1 class="text-3xl font-black uppercase tracking-normal">Verkleinwoorden</h1>
                        <span class="bg-black text-white px-2 py-0.5 text-[10px] uppercase font-bold tracking-widest">${catLabel}</span>
                    </div>
                    <div class="text-[10px] font-bold uppercase text-gray-400 text-right">Naam: .........................</div>
                </header>
                <div id="preview-list">
                    ${currentSelection.map(item => `
                        <div class="woord-blok">
                            <div class="ws-word-container">${item.word}</div>
                            <div class="ws-line"></div>
                        </div>
                    `).join('')}
                </div>
                <footer class="page-footer">${footerText}</footer>
            </div>
        `;

        if (showAns) {
            html += `
                <div class="page-container page-break">
                    <header class="flex justify-between items-end border-b-2 border-black pb-4 mb-8">
                        <div>
                            <h1 class="text-3xl font-black uppercase tracking-normal">Verbeterblad</h1>
                            <span class="bg-black text-white px-2 py-0.5 text-[10px] uppercase font-bold tracking-widest">${catLabel}</span>
                        </div>
                    </header>
                    <div class="grid grid-cols-2 gap-x-8 gap-y-2 text-sm italic">
                        ${currentSelection.map(item => `<div>${item.word} &rarr; <b>${solve[item.cat](item.word)}</b></div>`).join('')}
                    </div>
                    <footer class="page-footer">${footerText}</footer>
                </div>
            `;
        }

        document.getElementById('ws-content').innerHTML = html;
    }

    document.getElementById('f-size').addEventListener('input', (e) => {
        const val = e.target.value + 'px';
        document.getElementById('val-f-size').innerText = val;
        document.documentElement.style.setProperty('--dynamic-font-size', val);
    });

    document.getElementById('line-space').addEventListener('input', (e) => {
        const val = e.target.value + 'px';
        document.getElementById('val-spacing').innerText = val;
        document.documentElement.style.setProperty('--dynamic-spacing', val);
    });

    document.getElementById('show-ans').addEventListener('change', buildWorksheet);
</script>
</body>
</html>
